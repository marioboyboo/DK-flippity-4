<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donkey Kong Flippity 4</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to bottom, #ff0000, #ffaa00);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: Impact, sans-serif;
}

h1 {
    color: yellow;
    font-size: 50px;
    text-shadow: 4px 4px black;
}

.dk {
    width: 80%;
    max-width: 800px;
    animation: realBackflip 1.4s ease-in-out infinite;
    transform-origin: center bottom;
}

@keyframes realBackflip {

    0% {
        transform: translateY(0px) rotate(0deg);
    }

    25% {
        transform: translateY(-150px) rotate(-180deg);
    }

    50% {
        transform: translateY(0px) rotate(-360deg);
    }

    75% {
        transform: translateY(-75px) rotate(-540deg);
    }

    100% {
        transform: translateY(0px) rotate(-720deg);
    }
}

button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 20px;
    background: black;
    color: yellow;
    border: 3px solid yellow;
    border-radius: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>DONKEY KONG FLIPPITY 4</h1>

<img src="dk.jpg" class="dk">

<button onclick="alert('ULTRA FLIPPITY MODE 🍌')">
Activate Flippity
</button>

</body>
</html>
